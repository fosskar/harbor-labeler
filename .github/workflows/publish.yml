name: publish
# Runs only after the e2e workflow succeeded for a push to main, so a broken
# image can never be published before e2e catches it. Docs-only pushes don't
# trigger e2e (path filter) and therefore don't refresh the :main snapshot —
# they don't change the image. workflow_dispatch is the manual escape hatch.
on:
  workflow_run:
    workflows: [e2e]
    types: [completed]
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write # release job creates the git tag + github release
  packages: write
env:
  IMAGE: ghcr.io/${{ github.repository }}
  CHARTS: ghcr.io/${{ github.repository_owner }}/charts
  # ubuntu runner ships a v1-format /etc/containers/registries.conf that
  # nixpkgs skopeo rejects; point it at an empty (valid v2) config instead
  CONTAINERS_REGISTRIES_CONF: /dev/null
jobs:
  publish:
    # workflow_run fires for every completed e2e run on head branch main,
    # including failures and fork PRs from a branch named main — publish only
    # on a successful run for a push.
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # publish exactly the commit e2e tested, not main's current tip
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: cachix/install-nix-action@v31
      # CI (nix flake check, incl. formatting) is nixbot's job; publish stays
      # gated on the image build, whose buildGoModule check phase runs the go
      # test suite.
      - name: build image
        run: nix build .#image
      # Release gate: a VERSION bump (image tag not yet in ghcr) makes this
      # push a release; otherwise it only refreshes the :main snapshot.
      - name: decide snapshot or release
        id: gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          nix run nixpkgs#skopeo -- login ghcr.io \
            --username "${{ github.actor }}" --password "$GITHUB_TOKEN"
          version=$(nix eval --raw .#default.version)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if nix run nixpkgs#skopeo -- inspect --no-tags "docker://$IMAGE:$version" > /dev/null 2>&1; then
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi
      - name: push snapshot image
        if: steps.gate.outputs.release == 'false'
        run: |
          # streamLayeredImage: ./result emits a docker-archive tar stream
          ./result | nix run nixpkgs#skopeo -- copy \
            docker-archive:/dev/stdin "docker://$IMAGE:main"
      - name: push release image
        if: steps.gate.outputs.release == 'true'
        run: |
          version=${{ steps.gate.outputs.version }}
          ./result > image.tar
          nix run nixpkgs#skopeo -- copy \
            docker-archive:image.tar "docker://$IMAGE:$version"
          nix run nixpkgs#skopeo -- copy \
            docker-archive:image.tar "docker://$IMAGE:latest"
      - name: push helm chart
        if: steps.gate.outputs.release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=${{ steps.gate.outputs.version }}
          helm registry login ghcr.io \
            --username "${{ github.actor }}" --password-stdin <<< "$GITHUB_TOKEN"
          helm package chart/ --version "$version" --app-version "$version"
          helm push "harbor-labeler-$version.tgz" "oci://$CHARTS"
      - name: tag and github release
        if: steps.gate.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=${{ steps.gate.outputs.version }}
          git tag "v$version"
          git push origin "v$version"
          gh release create "v$version" --generate-notes
